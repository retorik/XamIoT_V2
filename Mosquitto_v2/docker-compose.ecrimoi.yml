services:
  mosquitto-v2:
    build: .
    container_name: mosquitto-v2
    restart: unless-stopped
    env_file: .env.prod
    networks: [backend, proxy, xamiot_v2_net]
    volumes:
      - xamiot_v2_mosquitto_data:/mosquitto/data
      - xamiot_v2_mosquitto_log:/mosquitto/log
    labels:
      # TCP router — Traefik termine le TLS sur mqtt.xamiot.com:8883
      # et forward en clair vers Mosquitto:1883
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.tcp.routers.xamiot-mqtt-v2.rule=HostSNI(`mqtt.xamiot.com`)
      - traefik.tcp.routers.xamiot-mqtt-v2.entrypoints=mqtts
      - traefik.tcp.routers.xamiot-mqtt-v2.tls=true
      - traefik.tcp.routers.xamiot-mqtt-v2.tls.certresolver=le
      - traefik.tcp.services.xamiot-mqtt-v2.loadbalancer.server.port=1883

volumes:
  xamiot_v2_mosquitto_data:
  xamiot_v2_mosquitto_log:

networks:
  backend:
    external: true
  proxy:
    external: true
  xamiot_v2_net:
    external: true
