; ============================================================
;  ESP32-C3 HumanSensor v2 — HLK-LD2410C + XamIoT
;  Basé sur la même structure que ESP32-C3-Sensor_v2 (SoundSense)
; ============================================================

[env]
platform = espressif32@6.10.0
board = adafruit_qtpy_esp32c3
framework = arduino
board_build.partitions = partitions/huge_app.csv

lib_deps =
    knolleary/PubSubClient @ ^2.8

monitor_speed = 115200

build_flags =
    -Os
    -Wl,--gc-sections
    -fno-exceptions
    -ffunction-sections
    -fdata-sections
    ; ⚠️ Définir OTA_HMAC_KEY avant tout déploiement en production
    ; Doit correspondre à OTA_HMAC_KEY dans .env.prod du backend
    -DOTA_HMAC_KEY='"CHANGE_ME_BEFORE_PRODUCTION"'

build_type = release

[env:humansensor]
upload_protocol = esptool
upload_speed = 115200
