services:
  xamiot-site:
    build: .
    container_name: xamiot-site
    restart: unless-stopped
    env_file: .env.prod
    networks: [proxy]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.xamiot-site.rule=Host(`xamsite.holiceo.com`)
      - traefik.http.routers.xamiot-site.entrypoints=websecure
      - traefik.http.routers.xamiot-site.tls.certresolver=le
      - traefik.http.services.xamiot-site.loadbalancer.server.port=3001

networks:
  proxy:
    external: true
