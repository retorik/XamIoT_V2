services:
  xamiot-site:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: https://api.xamiot.com
        NEXT_PUBLIC_PORTAL_URL: https://portail.xamiot.com
        NEXT_PUBLIC_SITE_URL: https://xamiot.com
    container_name: xamiot-site
    restart: unless-stopped
    env_file: .env.prod
    networks: [proxy]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.xamiot-site-v2.rule=Host(`xamiot.com`) || Host(`www.xamiot.com`)
      - traefik.http.routers.xamiot-site-v2.entrypoints=websecure
      - traefik.http.routers.xamiot-site-v2.tls.certresolver=le
      - traefik.http.services.xamiot-site-v2.loadbalancer.server.port=3001

networks:
  proxy:
    external: true
